<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Escala Easy VIBRA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Material Icons & JetBrains Mono / Inter Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN for guaranteed perfect styling and zero build-time configuration failures -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            jetfuel: {
              dark: '#020813',
              card: '#071426',
              border: '#10213b',
              green: '#10b981',
              success: '#10b981',
              warning: '#f59e0b',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom Scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #020813;
    }
    ::-webkit-scrollbar-thumb {
      background: #10213b;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #10b981;
    }
    
    body {
      background-color: #020813;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-[#020813]">
  <app-root></app-root>
</body>
</html>
